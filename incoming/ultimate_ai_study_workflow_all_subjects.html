          {title:'Handwritten note gap scan',desc:'Photo your handwritten notes, upload to Claude. It finds what\'s missing and adds exam-relevant content.',tools:['Claude (image)','Phone camera'],prompt:'"These are my Thermodynamics notes [image]. What JEE concepts am I missing? What\'s incorrect? Add missing formulas with derivation shortcuts."'},

          {title:'Rapid-fire oral quiz',desc:'Claude asks 10 questions one at a time, waits for your answer, then grades and fully explains each at the end.',tools:['Claude'],prompt:'"Quiz me on Optics for JEE. Ask 10 questions one by one. Wait for my answer before continuing. Final score + detailed explanation for every mistake."'},

          {title:'Generalise after solving',desc:'After solving, ask Claude for the problem template and 3 harder JEE variants — this builds pattern recognition.',tools:['Claude'],prompt:'"I solved this [paste solution]. Now generalise: what\'s the underlying template? Give me 3 JEE Advanced variants of this with increasing difficulty."'},
          {title:'Photo-based instant doubt',desc:'Photograph any problem from HC Verma / DC Pandey / your test. Upload to Claude for step-by-step breakdown.',tools:['Claude (image)','Gemini (image)'],prompt:'"[Upload photo] Solve step by step. After solution: what concept is this really testing, and what\'s the 30-second mental shortcut for this question type?"'},

function subColor(si,type){
  const colors = [
    {bg:'#EEEDFE',text:'#3C3489',dk_bg:'#26215C',dk_text:'#CECBF6'},
    {bg:'#FAEEDA',text:'#633806',dk_bg:'#412402',dk_text:'#FAC775'},
    {bg:'#E1F5EE',text:'#085041',dk_bg:'#04342C',dk_text:'#9FE1CB'},
    {bg:'#E6F1FB',text:'#0C447C',dk_bg:'#042C53',dk_text:'#B5D4F4'},
    {bg:'#FBEAF0',text:'#72243E',dk_bg:'#4B1528',dk_text:'#F4C0D1'}
  ];
  const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches;
  const c = colors[si];
  if(type==='bg') return dark ? c.dk_bg : c.bg;
  return dark ? c.dk_text : c.text;
}

function renderAll(){
  const container = document.getElementById('panels');
  container.innerHTML = '';
  SUBJECTS.forEach((sub,si) => {
    const panel = document.createElement('div');
    panel.className = 'subject-panel' + (si===0?' active':'');
    panel.id = 'subj_'+si;

    const phaseTabs = document.createElement('div');
    phaseTabs.className = 'phase-tabs';
    phaseTabs.id = 'ptabs_'+si;
    PHASE_NAMES.forEach(pid => {
      const ph = sub.phases.find(p=>p.id===pid);
      if(!ph) return;
      const btn = document.createElement('button');
      btn.className = 'ptab' + (pid===curPhase[si]?' active':'');
      btn.innerHTML = `<i class="ti ${PHASE_META[pid].icon}" aria-hidden="true"></i>${PHASE_META[pid].label}`;
      btn.onclick = () => switchPhase(si, pid);
      phaseTabs.appendChild(btn);
    });
    panel.appendChild(phaseTabs);

    sub.phases.forEach(ph => {
      const view = document.createElement('div');
      view.className = 'phase-view' + (ph.id===curPhase[si]?' active':'');
      view.id = 'phase_'+si+'_'+ph.id;

      const bg = subColor(si,'bg');
      const tc = subColor(si,'text');

      let html = `<div class="phase-banner" style="background:${bg}">
        <div class="phase-icon" style="background:${bg}"><i class="ti ${ph.icon}" style="font-size:18px;color:${tc}" aria-hidden="true"></i></div>
        <div><div class="phase-title" style="color:${tc}">${ph.label}</div><div class="phase-timing" style="color:${tc};opacity:.75">${ph.timing}</div></div>
      </div>`;

      html += `<div class="section-lbl">Workflow</div><div class="flow-strip">`;
      ph.flow.forEach((f,fi) => {
        html += `<span class="fc" style="background:${bg};color:${tc}">${f}</span>`;
        if(fi<ph.flow.length-1) html += `<span class="fa">›</span>`;
      });
      html += `</div>`;

      html += `<div class="cards">`;
      ph.cards.forEach((c,ci) => {
        html += `<div class="card">
          <div class="card-head">
            <div class="step-dot" style="background:${bg};color:${tc}">${ci+1}</div>
            <div><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div></div>
          </div>
          <div class="tools">${c.tools.map(t=>`<span class="tool">${t}</span>`).join('')}</div>
          <div class="pbox"><div class="plabel">Prompt</div><div class="ptext">${c.prompt}</div></div>
        </div>`;
      });
      html += `</div>`;

      html += `<div class="tip" style="background:${bg}"><i class="ti ti-bulb" style="color:${tc}" aria-hidden="true"></i><span style="color:${tc}">${ph.tip}</span></div>`;

      if(ph.spBtn){
        html += `<button class="sp-btn" onclick="sendPrompt('${ph.spBtn.prompt.replace(/'/g,"\\'")}')"><i class="ti ti-external-link" aria-hidden="true"></i>${ph.spBtn.label}</button>`;
      }

      view.innerHTML = html;
      panel.appendChild(view);
    });

    container.appendChild(panel);
  });
}

function switchSub(si, btn){
  curSub = si;
  document.querySelectorAll('.subject-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.snav').forEach(b=>b.classList.remove('active'));
  document.getElementById('subj_'+si).classList.add('active');
  btn.classList.add('active');
}

function switchPhase(si, pid){
  curPhase[si] = pid;
  document.querySelectorAll('#phase_'+si+'_ .phase-view, [id^="phase_'+si+'_"]').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('#ptabs_'+si+' .ptab').forEach(b=>b.classList.remove('active'));
  const target = document.getElementById('phase_'+si+'_'+pid);
  if(target) target.classList.add('active');
  const tabs = document.getElementById('ptabs_'+si);
  if(tabs){
    const allTabs = tabs.querySelectorAll('.ptab');
    const phIdx = PHASE_NAMES.indexOf(pid);
    if(allTabs[phIdx]) allTabs[phIdx].classList.add('active');
  }
}

renderAll();
</script>
