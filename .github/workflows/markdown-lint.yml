name: Markdown Lint

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**/*.md'
      - '*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: 'docs/**/*.md'
          config: .markdownlint.json
        continue-on-error: true
