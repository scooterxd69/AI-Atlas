<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Atlas — Learn Faster With AI</title>
  <meta name="description" content="Free AI-powered learning ecosystem for JEE, NEET and school students. Study systems, prompt libraries, workflows, and 100+ AI tool guides." />
  <meta name="keywords" content="JEE AI study, NEET AI preparation, free AI tools students India, JEE prompts Claude, NEET prompts, CBSE AI study, AI Atlas" />
  <meta name="author" content="Naitik Singh" />
  <meta property="og:title" content="AI Atlas — Learn Faster With AI" />
  <meta property="og:description" content="Free AI-powered study systems for JEE, NEET and school students." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://scooterxd69.github.io/AI-Atlas/" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Docsify theme + custom overrides -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ============================================
       AI ATLAS — DESIGN SYSTEM
       Author: Naitik Singh
    ============================================ */
    :root {
      --theme-color: #00C896;
      --accent: #FF6B35;
      --accent2: #7B61FF;
      --bg: #0A0F1E;
      --bg2: #111827;
      --bg3: #1a2236;
      --text: #E8EDF5;
      --text-muted: #8899BB;
      --border: rgba(255,255,255,0.08);
      --sidebar-width: 280px;
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 12px;
      --glow: 0 0 40px rgba(0,200,150,0.15);
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--bg2) !important;
      border-right: 1px solid var(--border) !important;
      padding: 0 !important;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      text-decoration: none !important;
    }

    .sidebar-logo .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--theme-color), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .sidebar-logo span {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 18px;
      color: var(--text) !important;
    }

    .sidebar ul { padding: 8px 0 !important; }

    .sidebar ul li a {
      font-family: var(--font-body);
      color: var(--text-muted) !important;
      padding: 6px 20px !important;
      font-size: 14px;
      border-left: 2px solid transparent;
      transition: all 0.2s;
      display: block;
    }

    .sidebar ul li a:hover,
    .sidebar ul li.active > a {
      color: var(--theme-color) !important;
      border-left-color: var(--theme-color) !important;
      background: rgba(0,200,150,0.06) !important;
    }

    .sidebar ul li p {
      font-family: var(--font-heading);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted) !important;
      padding: 16px 20px 4px !important;
      margin: 0 !important;
    }

    /* ── CONTENT ── */
    .content { background: var(--bg) !important; }
    .markdown-section { max-width: 820px; padding: 48px 40px; }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      font-family: var(--font-heading);
      color: var(--text);
    }

    .markdown-section h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 16px; }
    .markdown-section h2 {
      font-size: 1.5rem; font-weight: 700;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px; margin-top: 40px;
    }

    .markdown-section a { color: var(--theme-color); text-decoration: none; }
    .markdown-section a:hover { text-decoration: underline; }

    .markdown-section code {
      background: var(--bg3);
      color: var(--theme-color);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.88em;
    }

    .markdown-section pre {
      background: var(--bg3) !important;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .markdown-section blockquote {
      border-left: 3px solid var(--theme-color);
      background: rgba(0,200,150,0.06);
      padding: 12px 20px;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.92rem;
    }
    .markdown-section th {
      background: var(--bg3);
      font-family: var(--font-heading);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 14px;
      text-align: left;
      color: var(--text-muted);
    }
    .markdown-section td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .markdown-section tr:hover td { background: var(--bg3); }

    /* ── NAVBAR ── */
    .app-nav { background: var(--bg2) !important; border-bottom: 1px solid var(--border) !important; }
    .app-nav a { color: var(--text-muted) !important; font-size: 13px; }
    .app-nav a:hover { color: var(--theme-color) !important; }

    /* ── SEARCH ── */
    .search input {
      background: var(--bg3) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 8px;
    }

    /* ── HOMEPAGE STYLES (README) ── */
    .hero-section {
      text-align: center;
      padding: 64px 0 48px;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,200,150,0.12);
      border: 1px solid rgba(0,200,150,0.3);
      color: var(--theme-color);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 20px;
      background: linear-gradient(135deg, #fff 0%, var(--theme-color) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .cta-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--theme-color);
      color: #0A0F1E;
      padding: 13px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-family: var(--font-heading);
      font-size: 15px;
      text-decoration: none !important;
      transition: transform 0.2s, box-shadow 0.2s;
      display: inline-block;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,200,150,0.3);
      text-decoration: none !important;
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      padding: 13px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none !important;
      border: 1px solid var(--border);
      transition: border-color 0.2s, color 0.2s;
      display: inline-block;
    }

    .btn-outline:hover {
      border-color: var(--theme-color);
      color: var(--theme-color);
      text-decoration: none !important;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 48px 0;
    }

    .stat-cell {
      background: var(--bg2);
      padding: 28px 20px;
      text-align: center;
    }

    .stat-num {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 800;
      color: var(--theme-color);
      display: block;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin: 32px 0;
    }

    .hub-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none !important;
      transition: border-color 0.2s, transform 0.2s;
      display: block;
    }

    .hub-card:hover {
      border-color: var(--theme-color);
      transform: translateY(-3px);
      text-decoration: none !important;
    }

    .hub-card .hub-icon {
      font-size: 28px;
      margin-bottom: 12px;
      display: block;
    }

    .hub-card .hub-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      display: block;
      margin-bottom: 6px;
    }

    .hub-card .hub-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .section-label {
      font-family: var(--font-heading);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--theme-color);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .section-sub {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 32px 0;
    }

    .feature-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .feature-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
    }

    .feature-icon.green { background: rgba(0,200,150,0.15); }
    .feature-icon.orange { background: rgba(255,107,53,0.15); }
    .feature-icon.purple { background: rgba(123,97,255,0.15); }

    .feature-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .feature-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 48px 0;
    }

    .footer-note {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 0 48px;
    }

    .footer-note a { color: var(--theme-color); }

    .tag {
      display: inline-block;
      background: rgba(0,200,150,0.1);
      color: var(--theme-color);
      border: 1px solid rgba(0,200,150,0.2);
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      margin: 0 2px 4px;
      letter-spacing: 0.03em;
    }

    .tag.orange {
      background: rgba(255,107,53,0.1);
      color: var(--accent);
      border-color: rgba(255,107,53,0.2);
    }

    .tag.purple {
      background: rgba(123,97,255,0.1);
      color: var(--accent2);
      border-color: rgba(123,97,255,0.2);
    }

    /* Scroll to top */
    .progress-indicator { background: var(--theme-color) !important; }

    /* Mobile */
    @media (max-width: 768px) {
      .hero-title { font-size: 2.2rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .feature-grid { grid-template-columns: 1fr; }
      .hub-grid { grid-template-columns: 1fr 1fr; }
      .markdown-section { padding: 32px 20px; }
    }

    @media (max-width: 480px) {
      .hub-grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div id="app">Loading AI Atlas…</div>

  <script>
    window.$docsify = {
      name: '',
      repo: 'https://github.com/scooterxd69/AI-Atlas',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: false,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search AI Atlas...',
        noData: 'No results found.',
        depth: 4,
      },
      plugins: [
        function(hook) {
          // Inject sidebar logo
          hook.doneEach(function() {
            const sidebar = document.querySelector('.sidebar-nav');
            if (sidebar && !document.querySelector('.sidebar-logo')) {
              const logo = document.createElement('a');
              logo.className = 'sidebar-logo';
              logo.href = '#/';
              logo.innerHTML = '<div class="logo-mark">🗺️</div><span>AI Atlas</span>';
              sidebar.parentElement.insertBefore(logo, sidebar);
            }
          });
        }
      ]
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <!-- Code highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
</body>
</html>
